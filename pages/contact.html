<!-- Page Header -->
<section class="bg-light py-5 text-center">
  <div class="container">
    <h1>Contact Us</h1>
    <p>Get in touch with AgriHub</p>
  </div>
</section>

<!-- Contact Section -->
<section class="py-5">
  <div class="container">
    <div class="row g-4">

      <!-- Form -->
      <div class="col-md-7">
        <div class="card">
          <div class="card-body">
            <h4 class="mb-3">Send Message</h4>

            <form>
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" placeholder="Enter your name">
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter your email">
              </div>

              <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea class="form-control" rows="4" placeholder="Write your message"></textarea>
              </div>

              <button type="submit" class="btn btn-success">Send</button>
            </form>

          </div>
        </div>
      </div>

      <!-- Contact Info -->
      <div class="col-md-5">
        <div class="card h-100">
          <div class="card-body">
            <h4>Contact Info</h4>
            <p><strong>Address:</strong> Dhaka, Bangladesh</p>
            <p><strong>Phone:</strong> +880123456789</p>
            <p><strong>Email:</strong> info@agrihub.com</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- Footer -->
<footer class="bg-success text-white text-center py-3">
  <div class="container">
    <p class="mb-0">&copy; 2026 AgriHub</p>
